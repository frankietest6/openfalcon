# ============================================================
# ShowPilot — Docker image publish workflow
# ============================================================
# Builds a multi-arch (amd64 + arm64) Docker image and publishes it to
# GitHub Container Registry (ghcr.io) on two triggers:
#
# 1. STABLE RELEASE — push a version tag like v0.18.5
#    git tag v0.18.5 && git push --tags
#    Produces these image tags on GHCR:
#      - ghcr.io/showpilotfpp/showpilot:0.18.5
#      - ghcr.io/showpilotfpp/showpilot:0.18
#      - ghcr.io/showpilotfpp/showpilot:latest
#    Users on `:latest` get the new version on next `docker compose pull`.
#
# 2. BETA — push to the beta branch
#    git checkout beta && git push
#    Produces:
#      - ghcr.io/showpilotfpp/showpilot:beta
#    Users on `:beta` get the new beta on next `docker compose pull`.
#    `:latest` is NOT updated — production users keep their stable build.
#
# The two channels are independent. Beta users opt in by pulling `:beta`;
# everyone else stays on `:latest` and never sees beta builds.
#
# NOTE on `:latest`: uses startsWith(github.ref, 'refs/tags/') rather than
# is_default_branch because tag-triggered runs have ref=refs/tags/vX.Y.Z —
# is_default_branch evaluates false on tag triggers, which was silently
# preventing :latest from being published on every release.
# ============================================================

name: Build and publish Docker image

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - beta
  # Allow manual triggering from the Actions UI for testing or re-publishing
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # QEMU lets the amd64 GitHub runner build arm64 images. Without this,
      # the arm64 build would fail because the runner can't natively execute
      # arm64 binaries during the build (better-sqlite3 compile, etc.).
      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GHCR using the auto-provided GITHUB_TOKEN. No secret to
      # configure manually — GitHub gives the workflow the right permissions
      # via the `packages: write` permission above.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate Docker tags. The semver patterns only match on tag pushes
      # (so `v0.18.5` becomes `0.18.5` + `0.18` + `latest`). The `ref` rule
      # below tags the beta branch as `beta`, so a push to the beta branch
      # produces `:beta` without affecting `:latest`.
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=branch,enable=${{ github.ref == 'refs/heads/beta' }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
