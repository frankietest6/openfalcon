# ============================================================
# ShowPilot — Docker image publish workflow
# ============================================================
# Builds a multi-arch (amd64 + arm64) Docker image and publishes it to
# GitHub Container Registry (ghcr.io) whenever a version tag is pushed.
#
# To cut a release and trigger this workflow:
#
#     git tag v0.18.5
#     git push --tags
#
# That produces three image tags on GHCR:
#   - ghcr.io/showpilotfpp/showpilot:0.18.5
#   - ghcr.io/showpilotfpp/showpilot:0.18
#   - ghcr.io/showpilotfpp/showpilot:latest
#
# Users run `docker pull ghcr.io/showpilotfpp/showpilot:latest` and skip the
# git clone + local build entirely.
# ============================================================

name: Build and publish Docker image

on:
  push:
    tags:
      - 'v*.*.*'
  # Allow manual triggering from the Actions UI for testing or re-publishing
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # QEMU lets the amd64 GitHub runner build arm64 images. Without this,
      # the arm64 build would fail because the runner can't natively execute
      # arm64 binaries during the build (better-sqlite3 compile, etc.).
      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GHCR using the auto-provided GITHUB_TOKEN. No secret to
      # configure manually — GitHub gives the workflow the right permissions
      # via the `packages: write` permission above.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate Docker tags from the git tag. For tag `v0.18.5` this emits
      # `0.18.5`, `0.18`, and `latest`. Users who pin to a specific version
      # use the full tag; users who want auto-updates use `latest`.
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
